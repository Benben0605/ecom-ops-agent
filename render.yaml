services:
  - type: web
    name: ecom-ops-agent
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_MODEL
        sync: false
      - key: EMBED_API_KEY
        sync: false
      - key: EMBED_BASE_URL
        sync: false
      - key: EMBED_MODEL
        sync: false
