<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eval Dashboard | 私域电商运营 Agent</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #172033;
      --muted: #64748b;
      --border: #d9e0ea;
      --blue: #2563eb;
      --blue-soft: #e8f0ff;
      --green: #15803d;
      --green-soft: #e8f7ee;
      --red: #dc2626;
      --red-soft: #fff0f0;
      --amber: #b45309;
      --amber-soft: #fff7e6;
      --slate: #334155;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      letter-spacing: 0;
    }
    header {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .brand strong { font-size: 16px; }
    .brand span { font-size: 12px; color: var(--muted); }
    nav {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    a, button {
      font: inherit;
    }
    a {
      color: var(--blue);
      text-decoration: none;
      font-size: 14px;
    }
    button {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      height: 34px;
      padding: 0 12px;
      cursor: pointer;
    }
    button:hover { border-color: #9aa8bc; }
    button.active {
      border-color: var(--blue);
      color: var(--blue);
      background: var(--blue-soft);
    }
    main {
      padding: 18px 24px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(6, minmax(140px, 1fr));
      gap: 10px;
    }
    .metric {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      min-width: 0;
    }
    .metric label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }
    .metric strong {
      display: block;
      font-size: 24px;
      line-height: 1;
      white-space: nowrap;
    }
    .metric small {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(360px, 0.85fr);
      gap: 14px;
      align-items: start;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      min-width: 0;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }
    .panel-head h2 {
      margin: 0;
      font-size: 15px;
      line-height: 1.2;
    }
    .panel-body { padding: 12px 14px; }
    .filters {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }
    input, select {
      height: 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 10px;
      background: #fff;
      color: var(--text);
      font: inherit;
      min-width: 0;
    }
    input { width: 220px; }
    select { width: 132px; }
    .breakdowns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .mini-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .mini-table th,
    .mini-table td {
      text-align: left;
      padding: 7px 8px;
      border-bottom: 1px solid #edf1f6;
      vertical-align: middle;
    }
    .mini-table th {
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
    }
    .bar {
      height: 8px;
      min-width: 64px;
      border-radius: 999px;
      background: #edf1f6;
      overflow: hidden;
    }
    .bar span {
      display: block;
      height: 100%;
      background: var(--blue);
    }
    .case-table-wrap {
      overflow: auto;
      max-height: calc(100vh - 320px);
    }
    .case-table {
      width: 100%;
      min-width: 780px;
      border-collapse: collapse;
      font-size: 13px;
    }
    .case-table th,
    .case-table td {
      padding: 10px 8px;
      border-bottom: 1px solid #edf1f6;
      text-align: left;
      vertical-align: top;
    }
    .case-table th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #f9fbfd;
      color: var(--muted);
      font-weight: 600;
    }
    .case-table tr {
      cursor: pointer;
    }
    .case-table tr:hover td {
      background: #f9fbfd;
    }
    .case-table tr.selected td {
      background: var(--blue-soft);
    }
    .question {
      max-width: 340px;
      line-height: 1.45;
    }
    .muted { color: var(--muted); }
    .nowrap { white-space: nowrap; }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      min-height: 24px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #edf1f6;
      color: var(--slate);
      font-size: 12px;
      overflow-wrap: anywhere;
    }
    .chip.green { background: var(--green-soft); color: var(--green); }
    .chip.red { background: var(--red-soft); color: var(--red); }
    .chip.amber { background: var(--amber-soft); color: var(--amber); }
    .chip.blue { background: var(--blue-soft); color: var(--blue); }
    .detail {
      position: sticky;
      top: 14px;
      max-height: calc(100vh - 28px);
      overflow: auto;
    }
    .detail-title {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }
    .detail-title h2 {
      margin: 0;
      font-size: 16px;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }
    .section {
      padding: 8px 0;
      border-bottom: 1px solid #edf1f6;
    }
    .section:last-child { border-bottom: 0; }
    .section h3 {
      margin: 0 0 8px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }
    .session-trace {
      padding: 0;
      border-bottom: 1px solid #edf1f6;
    }
    .session-trace:last-child { border-bottom: 0; }
    .session-trace h3 {
      margin: 0 0 2px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }
    .session-messages {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    pre {
      margin: 0;
      padding: 10px;
      border: 1px solid #e5eaf2;
      border-radius: 8px;
      background: #f9fbfd;
      overflow: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font-size: 12px;
      line-height: 1.45;
    }
    .message {
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr);
      gap: 6px;
      align-items: start;
      padding: 2px 0;
      border-bottom: 1px solid #edf1f6;
      font-size: 13px;
      line-height: 1.25;
    }
    .message:last-child { border-bottom: 0; }
    .role {
      color: var(--muted);
      font-weight: 600;
      overflow-wrap: anywhere;
    }
    .message-content {
      display: block;
      justify-self: start;
      align-self: start;
      width: fit-content;
      max-width: 100%;
      overflow-wrap: anywhere;
      line-height: 1.25;
    }
    .message-text {
      white-space: pre-line;
      overflow-wrap: anywhere;
    }
    .message.tool {
      padding: 2px 0;
    }
    .message.tool .message-text {
      display: inline;
    }
    .tool-call {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 6px;
      margin-top: 1px;
      padding: 0;
    }
    .tool-call-title {
      color: var(--blue);
      font-weight: 600;
      font-size: 12px;
    }
    .tool-call-json {
      padding: 1px 6px;
      border: 1px solid #e5eaf2;
      border-radius: 6px;
      background: #f9fbfd;
      font-size: 12px;
      line-height: 1.25;
      white-space: normal;
      overflow-wrap: anywhere;
    }
    .empty {
      padding: 32px 16px;
      text-align: center;
      color: var(--muted);
    }
    .error {
      padding: 14px;
      color: var(--red);
      background: var(--red-soft);
      border: 1px solid #fecaca;
      border-radius: 8px;
    }
    @media (max-width: 1180px) {
      .metrics { grid-template-columns: repeat(3, minmax(140px, 1fr)); }
      .layout { grid-template-columns: 1fr; }
      .detail {
        position: static;
        max-height: none;
      }
      .case-table-wrap { max-height: none; }
    }
    @media (max-width: 720px) {
      header {
        height: auto;
        min-height: 56px;
        padding: 10px 14px;
        align-items: flex-start;
        gap: 8px;
      }
      nav { flex-direction: column; align-items: flex-end; }
      main { padding: 12px; }
      .metrics { grid-template-columns: 1fr 1fr; }
      .breakdowns { grid-template-columns: 1fr; }
      input { width: 100%; }
      select { width: 100%; }
      .filters { align-items: stretch; }
      .filters button { flex: 1 1 30%; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <strong>Eval Dashboard</strong>
      <span id="subtitle">读取 logs 中的最新评估结果</span>
    </div>
    <nav>
      <a href="/">聊天工作台</a>
      <button id="refresh">刷新</button>
    </nav>
  </header>

  <main>
    <section class="metrics" id="metrics"></section>

    <section class="breakdowns">
      <div class="panel">
        <div class="panel-head"><h2>Bucket 表现</h2></div>
        <div class="panel-body" id="bucketBreakdown"></div>
      </div>
      <div class="panel">
        <div class="panel-head"><h2>工具表现</h2></div>
        <div class="panel-body" id="toolBreakdown"></div>
      </div>
    </section>

    <section class="layout">
      <div class="panel">
        <div class="panel-head">
          <h2>Case 列表</h2>
          <div class="filters">
            <button data-filter="issues" class="active">问题</button>
            <button data-filter="route_error">路由错误</button>
            <button data-filter="misfire">误触发</button>
            <button data-filter="pass">通过</button>
            <button data-filter="all">全部</button>
            <select id="bucketFilter" aria-label="Bucket 过滤"></select>
            <input id="search" type="search" placeholder="搜索 case / 问题 / 工具" />
          </div>
        </div>
        <div class="case-table-wrap">
          <table class="case-table">
            <thead>
              <tr>
                <th>Case</th>
                <th>Bucket</th>
                <th>问题</th>
                <th>期望工具</th>
                <th>实际工具</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody id="caseRows"></tbody>
          </table>
        </div>
      </div>

      <aside class="panel detail" id="detail">
        <div class="empty">选择一个 case 查看追溯详情</div>
      </aside>
    </section>
  </main>

  <script>
    const state = {
      data: null,
      filter: "issues",
      bucket: "all",
      search: "",
      selectedCaseId: "",
    };

    const metricsEl = document.getElementById("metrics");
    const bucketBreakdownEl = document.getElementById("bucketBreakdown");
    const toolBreakdownEl = document.getElementById("toolBreakdown");
    const caseRowsEl = document.getElementById("caseRows");
    const detailEl = document.getElementById("detail");
    const bucketFilterEl = document.getElementById("bucketFilter");
    const searchEl = document.getElementById("search");
    const subtitleEl = document.getElementById("subtitle");

    function percent(value) {
      return `${(Number(value || 0) * 100).toFixed(1)}%`;
    }

    function jsonBlock(value) {
      return `<pre>${escapeHtml(JSON.stringify(value, null, 2))}</pre>`;
    }

    function compactJsonBlock(value) {
      return `<code class="tool-call-json">${escapeHtml(JSON.stringify(value))}</code>`;
    }

    function compactMessageText(value) {
      return String(value ?? "").trim().replace(/\n{2,}/g, "\n");
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function chips(values, tone = "") {
      if (!values || values.length === 0) return '<span class="muted">无</span>';
      return `<div class="chips">${values.map((value) => `<span class="chip ${tone}">${escapeHtml(value)}</span>`).join("")}</div>`;
    }

    function statusChips(row) {
      if (row.not_run) return chips(["未评估"], "amber");
      const items = [];
      if (row.route_error) items.push("路由错误");
      if (row.is_misfire) items.push("误触发");
      if (items.length === 0) items.push("通过");
      const tone = items[0] === "通过" ? "green" : "red";
      return chips(items, tone);
    }

    function caseMatches(row) {
      if (state.bucket !== "all" && row.bucket !== state.bucket) return false;
      if (state.filter === "issues" && !(row.route_error || row.is_misfire || row.not_run)) return false;
      if (state.filter === "route_error" && !row.route_error) return false;
      if (state.filter === "misfire" && !row.is_misfire) return false;
      if (state.filter === "pass" && (row.route_error || row.is_misfire || row.not_run)) return false;

      const keyword = state.search.trim().toLowerCase();
      if (!keyword) return true;
      const haystack = [
        row.case_id,
        row.bucket,
        row.question,
        row.expected_tools.join(" "),
        row.called_tools.join(" "),
        row.trap,
      ].join(" ").toLowerCase();
      return haystack.includes(keyword);
    }

    function filteredCases() {
      return state.data.cases.filter(caseMatches);
    }

    function renderMetrics() {
      const metrics = state.data.metrics;
      const cards = [
        ["路由准确率", percent(metrics.routing_accuracy), `${metrics.route_hit_count}/${metrics.positive_case_count} 正样本命中`],
        ["误触发率", percent(metrics.misfire_rate), `${metrics.misfire_count}/${metrics.evaluated_case_count} 已评估 case`],
        ["问题 Case", metrics.failure_case_count, "路由错误或误触发"],
        ["路由错误", metrics.route_error_count, "期望工具未完整命中"],
        ["覆盖率", percent(metrics.coverage_rate), `${metrics.evaluated_case_count}/${metrics.case_count} case`],
        ["评估集规模", metrics.case_count, "eval_cases.json"],
      ];
      metricsEl.innerHTML = cards.map(([label, value, hint]) => `
        <div class="metric">
          <label>${escapeHtml(label)}</label>
          <strong>${escapeHtml(value)}</strong>
          <small>${escapeHtml(hint)}</small>
        </div>
      `).join("");
      subtitleEl.textContent = `生成时间 ${state.data.generated_at}`;
    }

    function renderBreakdownTable(rows, firstColumn, rateKey) {
      if (!rows.length) return '<div class="empty">暂无数据</div>';
      return `
        <table class="mini-table">
          <thead>
            <tr>
              <th>${escapeHtml(firstColumn)}</th>
              <th>Case</th>
              <th>命中率</th>
              <th>误触发</th>
            </tr>
          </thead>
          <tbody>
            ${rows.map((row) => {
              const name = row.bucket || row.tool_name;
              const rate = row[rateKey] || 0;
              const hasPositiveCases = row.positive_case_count > 0;
              return `
                <tr>
                  <td>${escapeHtml(name)}</td>
                  <td class="nowrap">${row.evaluated_case_count}/${row.case_count}</td>
                  <td>
                    <div class="bar"><span style="width:${hasPositiveCases ? Math.round(rate * 100) : 0}%"></span></div>
                    <span class="muted">${hasPositiveCases ? percent(rate) : "N/A"}</span>
                  </td>
                  <td class="nowrap">${row.misfire_count}</td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      `;
    }

    function renderBreakdowns() {
      bucketBreakdownEl.innerHTML = renderBreakdownTable(
        state.data.breakdowns.by_bucket,
        "Bucket",
        "routing_accuracy"
      );
      toolBreakdownEl.innerHTML = renderBreakdownTable(
        state.data.breakdowns.by_expected_tool,
        "期望工具",
        "routing_accuracy"
      );
    }

    function renderBucketOptions() {
      const buckets = [...new Set(state.data.cases.map((row) => row.bucket))].sort();
      bucketFilterEl.innerHTML = [
        '<option value="all">全部 Bucket</option>',
        ...buckets.map((bucket) => `<option value="${escapeHtml(bucket)}">${escapeHtml(bucket)}</option>`),
      ].join("");
      bucketFilterEl.value = state.bucket;
    }

    function renderCases() {
      const rows = filteredCases();
      if (!rows.length) {
        caseRowsEl.innerHTML = '<tr><td colspan="6"><div class="empty">没有匹配的 case</div></td></tr>';
        detailEl.innerHTML = '<div class="empty">没有可追溯的 case</div>';
        return;
      }

      if (!rows.some((row) => row.case_id === state.selectedCaseId)) {
        state.selectedCaseId = rows[0].case_id;
      }

      caseRowsEl.innerHTML = rows.map((row) => `
        <tr data-case-id="${escapeHtml(row.case_id)}" class="${row.case_id === state.selectedCaseId ? "selected" : ""}">
          <td class="nowrap"><strong>${escapeHtml(row.case_id)}</strong></td>
          <td>${escapeHtml(row.bucket)}</td>
          <td><div class="question">${escapeHtml(row.question)}</div></td>
          <td>${chips(row.expected_tools, "blue")}</td>
          <td>${chips(row.called_tools, row.is_misfire ? "red" : "")}</td>
          <td>${statusChips(row)}</td>
        </tr>
      `).join("");

      caseRowsEl.querySelectorAll("tr[data-case-id]").forEach((rowEl) => {
        rowEl.addEventListener("click", () => {
          state.selectedCaseId = rowEl.dataset.caseId;
          renderCases();
          renderDetail();
        });
      });

      renderDetail();
    }

    function renderAudit(audits) {
      if (!audits.length) return '<div class="muted">没有工具调用审计记录</div>';
      return audits.map((audit, index) => `
        <div class="section">
          <h3>#${index + 1} ${escapeHtml(audit.tool_name || "unknown")} · ${Number(audit.tool_duration_ms || 0).toFixed(1)} ms</h3>
          ${audit.tool_error ? chips([audit.tool_error], "red") : ""}
          ${jsonBlock({
            params: audit.tool_params,
            output: audit.tool_output,
            error: audit.tool_error,
          })}
        </div>
      `).join("");
    }

    function parseToolArguments(argumentsValue) {
      if (!argumentsValue) return {};
      if (typeof argumentsValue === "object") return argumentsValue;
      try {
        return JSON.parse(argumentsValue);
      } catch {
        return argumentsValue;
      }
    }

    function renderMessageToolCalls(toolCalls) {
      if (!toolCalls || toolCalls.length === 0) return "";
      return toolCalls.map((call, index) => {
        const fn = call.function || {};
        const toolName = fn.name || "unknown";
        const toolParams = parseToolArguments(fn.arguments);
        return `<div class="tool-call"><span class="tool-call-title">tool_call #${index + 1} · ${escapeHtml(toolName)}</span><span class="muted">tool_params</span>${compactJsonBlock(toolParams)}</div>`;
      }).join("");
    }

    function renderMessages(messagesBySession) {
      const sessionIds = Object.keys(messagesBySession);
      if (!sessionIds.length) return '<div class="muted">没有会话消息记录</div>';

      return sessionIds.map((sessionId) => {
        const messages = messagesBySession[sessionId] || [];
        return `
          <div class="session-trace">
            <h3>Session ${escapeHtml(sessionId)}</h3>
            <div class="session-messages">${messages.map((message) => {
              const toolCalls = message.tool_calls || [];
              const toolCallContent = renderMessageToolCalls(toolCalls);
              const content = compactMessageText(message.content || (toolCallContent ? "assistant requested tool calls" : ""));
              const textContent = content ? `<div class="message-text">${escapeHtml(content)}</div>` : "";
              const roleClass = /^[a-z_-]+$/i.test(message.role || "") ? message.role : "unknown";
              return `<div class="message ${roleClass}"><div class="role">${escapeHtml(message.role)}</div><div class="message-content">${textContent}${toolCallContent}</div></div>`;
            }).join("")}</div>
          </div>
        `;
      }).join("");
    }

    function renderDetail() {
      const row = state.data.cases.find((item) => item.case_id === state.selectedCaseId);
      if (!row) {
        detailEl.innerHTML = '<div class="empty">选择一个 case 查看追溯详情</div>';
        return;
      }

      detailEl.innerHTML = `
        <div class="panel-head">
          <div class="detail-title">
            <h2>${escapeHtml(row.case_id)} · ${escapeHtml(row.bucket)}</h2>
            <div class="chips">
              ${row.route_error ? '<span class="chip red">路由错误</span>' : ""}
              ${row.is_misfire ? '<span class="chip red">误触发</span>' : ""}
              ${row.not_run ? '<span class="chip amber">未评估</span>' : ""}
              ${!row.route_error && !row.is_misfire && !row.not_run ? '<span class="chip green">通过</span>' : ""}
            </div>
          </div>
        </div>
        <div class="panel-body">
          <div class="section">
            <h3>用户问题</h3>
            <pre>${escapeHtml(row.question)}</pre>
          </div>
          ${row.trap ? `<div class="section"><h3>陷阱备注</h3><pre>${escapeHtml(row.trap)}</pre></div>` : ""}
          <div class="section">
            <h3>路由差异</h3>
            <div class="chips">
              <span class="chip blue">期望 ${escapeHtml(row.expected_tools.join(", ") || "无")}</span>
              <span class="chip ${row.is_misfire ? "red" : ""}">实际 ${escapeHtml(row.called_tools.join(", ") || "无")}</span>
              ${row.missing_tools.length ? `<span class="chip amber">漏调 ${escapeHtml(row.missing_tools.join(", "))}</span>` : ""}
              ${row.unexpected_tools.length ? `<span class="chip red">多调 ${escapeHtml(row.unexpected_tools.join(", "))}</span>` : ""}
            </div>
          </div>
          <div class="section">
            <h3>评估集期望调用</h3>
            ${jsonBlock(row.expected_calls)}
          </div>
          <div class="section">
            <h3>工具审计</h3>
            ${renderAudit(row.audits)}
          </div>
          <div class="section">
            <h3>会话消息</h3>
            ${renderMessages(row.messages_by_session)}
          </div>
          ${row.last_assistant_message ? `<div class="section"><h3>最终回复</h3><pre>${escapeHtml(compactMessageText(row.last_assistant_message))}</pre></div>` : ""}
        </div>
      `;
    }

    function renderAll() {
      renderMetrics();
      renderBreakdowns();
      renderBucketOptions();
      renderCases();
    }

    async function loadDashboard() {
      metricsEl.innerHTML = '<div class="metric"><label>加载中</label><strong>...</strong><small>读取评估日志</small></div>';
      try {
        const res = await fetch("/api/eval-dashboard", { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        state.data = await res.json();
        renderAll();
      } catch (error) {
        metricsEl.innerHTML = "";
        bucketBreakdownEl.innerHTML = "";
        toolBreakdownEl.innerHTML = "";
        caseRowsEl.innerHTML = "";
        detailEl.innerHTML = `<div class="error">Dashboard 加载失败：${escapeHtml(error.message)}</div>`;
      }
    }

    document.querySelectorAll("[data-filter]").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll("[data-filter]").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        state.filter = button.dataset.filter;
        renderCases();
      });
    });

    bucketFilterEl.addEventListener("change", () => {
      state.bucket = bucketFilterEl.value;
      renderCases();
    });

    searchEl.addEventListener("input", () => {
      state.search = searchEl.value;
      renderCases();
    });

    document.getElementById("refresh").addEventListener("click", loadDashboard);

    loadDashboard();
  </script>
</body>
</html>
