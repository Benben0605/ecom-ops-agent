<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>私域电商运营 Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f6f8; height: 100vh; display: flex; flex-direction: column;
    }
    header {
      padding: 14px 20px; background: #fff; border-bottom: 1px solid #e5e7eb;
      font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 8px;
    }
    header .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
    #log {
      flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px;
    }
    .msg { max-width: 72%; padding: 10px 14px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .user { align-self: flex-end; background: #2563eb; color: #fff; border-bottom-right-radius: 3px; }
    .agent { align-self: flex-start; background: #fff; color: #1f2937; border: 1px solid #e5e7eb; border-bottom-left-radius: 3px; }
    .agent.pending { color: #9ca3af; font-style: italic; }
    footer { padding: 14px 20px; background: #fff; border-top: 1px solid #e5e7eb; display: flex; gap: 10px; }
    #input {
      flex: 1; padding: 11px 14px; border: 1px solid #d1d5db; border-radius: 10px;
      font-size: 15px; outline: none; resize: none;
    }
    #input:focus { border-color: #2563eb; }
    #send {
      padding: 0 22px; border: none; border-radius: 10px; background: #2563eb; color: #fff;
      font-size: 15px; cursor: pointer;
    }
    #send:disabled { background: #93c5fd; cursor: not-allowed; }
  </style>
</head>
<body>
  <header><span class="dot"></span>私域电商运营 Agent</header>
  <div id="log"></div>
  <footer>
    <textarea id="input" rows="1" placeholder="问订单状态、退换货政策…（Enter 发送，Shift+Enter 换行）"></textarea>
    <button id="send">发送</button>
  </footer>

  <script>
    const log = document.getElementById("log");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    let sessionId = "";

    function addMsg(text, role) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      return div;
    }

    async function ask() {
      const text = input.value.trim();
      if (!text) return;
      input.value = "";
      input.style.height = "auto";
      addMsg(text, "user");

      const pending = addMsg("思考中…", "agent pending");
      send.disabled = true;
      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ session_id: sessionId, user_input: text }),
        });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        sessionId = data.session_id;
        pending.textContent = data.assistant_message;
        pending.className = "msg agent";
      } catch (e) {
        pending.textContent = "出错了：" + e.message;
        pending.className = "msg agent";
      } finally {
        send.disabled = false;
        input.focus();
      }
    }

    send.addEventListener("click", ask);
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); ask(); }
    });
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 120) + "px";
    });
  </script>
</body>
</html>
